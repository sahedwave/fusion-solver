name: ci-fast
on:
  pull_request:
  push:
    branches: [main, master]
jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pyyaml
      - run: python fusion_project/check_dynamic_g_promotion_policy.py
      - run: pytest fusion_project/test_dynamic_g_ci_policy.py -q
      - run: pytest fusion_project/test_multigroup_library.py -q -m "not heavy"
      - run: pytest fusion_project/test_phase8.py -q -m "not heavy"
